<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Hydrofoil Sim</title>
<style>
  :root {
    --bg: #0b0f14;
    --panel: #111821;
    --line: #1f2a37;
    --fg: #cfd8e3;
    --dim: #6b7a8a;
    --accent: #6ad0ff;
    --warn: #ffb454;
    --ok: #7ee787;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font: 13px/1.4 ui-monospace, Menlo, Consolas, monospace;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 10px 12px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--dim);
    font-weight: 600;
  }
  canvas { display: block; width: 100%; }
  #scene { height: 280px; background: #07101a; border-radius: 3px; }
  #chart { height: 160px; background: #07101a; border-radius: 3px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .stat { display: flex; flex-direction: column; min-width: 110px; }
  .stat .k { color: var(--dim); font-size: 11px; letter-spacing: 1px; }
  .stat .v { color: var(--fg); font-size: 15px; font-variant-numeric: tabular-nums; }
  .badge {
    padding: 4px 10px;
    border-radius: 3px;
    font-weight: 700;
    letter-spacing: 1.5px;
    font-size: 12px;
    border: 1px solid currentColor;
  }
  .badge.hull { color: var(--warn); }
  .badge.foil { color: var(--ok); }
  button {
    background: transparent;
    color: var(--fg);
    border: 1px solid var(--line);
    padding: 8px 14px;
    font: inherit;
    letter-spacing: 1.5px;
    cursor: pointer;
    border-radius: 3px;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  .legend { color: var(--dim); font-size: 11px; }
  .legend .sw { display: inline-block; width: 10px; height: 2px; vertical-align: middle; margin-right: 4px; }
  .ctrl { display: flex; flex-direction: column; gap: 4px; min-width: 200px; }
  .ctrl .lbl { display: flex; justify-content: space-between; color: var(--dim); font-size: 11px; letter-spacing: 1px; }
  .ctrl .lbl .val { color: var(--fg); font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; accent-color: var(--accent); }
</style>
</head>
<body>
<div class="wrap">
  <div class="panel">
    <h1>HYDROFOIL FLIGHT CONTROLLER</h1>
    <canvas id="scene"></canvas>
  </div>

  <div class="panel row" style="justify-content: space-between;">
    <div class="row">
      <div class="stat"><span class="k">HEIGHT</span><span class="v" id="vH">0.00 m</span></div>
      <div class="stat"><span class="k">TARGET</span><span class="v">0.50 m</span></div>
      <div class="stat"><span class="k">FOIL ANGLE</span><span class="v" id="vA">0.0&deg;</span></div>
      <div class="stat"><span class="k">LIFT</span><span class="v" id="vL">0 N</span></div>
      <div class="stat"><span class="k">SPEED</span><span class="v">15.0 m/s</span></div>
    </div>
    <div class="row">
      <span id="status" class="badge hull">HULL-BORNE</span>
      <button id="btnDisturb">DISTURB</button>
      <button id="btnReset">RESET</button>
    </div>
  </div>

  <div class="panel row" style="gap: 24px;">
    <div class="ctrl">
      <div class="lbl"><span>WAVE AMPLITUDE</span><span class="val" id="wAmpV">0.00 m</span></div>
      <input type="range" id="wAmp" min="0" max="0.3" step="0.01" value="0">
    </div>
    <div class="ctrl">
      <div class="lbl"><span>WAVE FREQUENCY</span><span class="val" id="wFreqV">0.50 Hz</span></div>
      <input type="range" id="wFreq" min="0.1" max="1" step="0.05" value="0.5">
    </div>
  </div>

  <div class="panel">
    <div class="row" style="justify-content: space-between; margin-bottom: 6px;">
      <span class="legend"><span class="sw" style="background: var(--accent)"></span>HEIGHT &nbsp; <span class="sw" style="background: var(--warn)"></span>TARGET</span>
      <span class="legend">10 s window</span>
    </div>
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
"use strict";

// --- Constants -----------------------------------------------------------
const RHO     = 1025;     // water density [kg/m^3]
const V       = 15;       // forward speed [m/s]
const S       = 0.3;      // foil area [m^2]
const CL_A    = 1.2;      // lift coefficient slope factor
const MASS    = 800;      // [kg]  (per spec, denominator)
const WEIGHT  = 9800;     // [N]   (per spec, numerator)
const G_LIFT  = 0.5 * RHO * V * V * S * CL_A;   // Lift = G_LIFT * sin(angle)
const H_TGT   = 0.5;      // target height [m]
const DT      = 1 / 60;   // fixed step [s]
const A_MAX   = 25 * Math.PI / 180; // foil angle clamp [rad]

// Feedforward: angle to hold steady at target (Lift = Weight)
const TRIM = Math.asin(WEIGHT / G_LIFT);

// PID gains (tuned on linearized plant: ~3 rad/s nat. freq, ~0.7 damping)
const KP = 0.18;
const KI = 0.05;
const KD = 0.085;
const I_MAX = 2.0;   // integral clamp [error·s]

// --- State ---------------------------------------------------------------
let h, vH, integ, angle, simT;
let waveAmp = 0;       // [m]   (from slider)
let waveFreq = 0.5;    // [Hz]  (from slider)
function reset() {
  h = 0;
  vH = 0;
  integ = 0;
  angle = 0;
  simT = 0;
  chartBuf.length = 0;
}

// --- PID + physics step --------------------------------------------------
function step() {
  const err = H_TGT - h;
  integ += err * DT;
  if (integ >  I_MAX) integ =  I_MAX;
  if (integ < -I_MAX) integ = -I_MAX;
  // trim feedforward + PID; derivative on measurement avoids setpoint kicks
  let u = TRIM + KP * err + KI * integ - KD * vH;
  if (u >  A_MAX) u =  A_MAX;
  if (u < -A_MAX) u = -A_MAX;
  angle = u;

  // continuous wave acceleration disturbance (water heaving the boat)
  const omega = 2 * Math.PI * waveFreq;
  const waveAcc = waveAmp * omega * omega * Math.sin(omega * simT);

  const lift = G_LIFT * Math.sin(angle);
  const a    = (lift - WEIGHT) / MASS + waveAcc;
  vH += a * DT;
  h  += vH * DT;
  if (h < 0) { h = 0; if (vH < 0) vH = 0; }
  simT += DT;
  return lift;
}

// --- Rendering -----------------------------------------------------------
const scene = document.getElementById("scene");
const sctx  = scene.getContext("2d");
const chart = document.getElementById("chart");
const cctx  = chart.getContext("2d");

function fitCanvas(cv) {
  const dpr = window.devicePixelRatio || 1;
  const w = cv.clientWidth, hpx = cv.clientHeight;
  if (cv.width !== w * dpr || cv.height !== hpx * dpr) {
    cv.width  = w * dpr;
    cv.height = hpx * dpr;
  }
  return { w, h: hpx, dpr };
}

function drawScene() {
  const { w, h: H, dpr } = fitCanvas(scene);
  sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  sctx.clearRect(0, 0, w, H);

  const waterY = H * 0.62;
  const pxPerM = 80;

  // sky background
  sctx.fillStyle = "#07101a";
  sctx.fillRect(0, 0, w, waterY);

  // wave surface (animated sine; horizontal wavelength ~180 px, phase travels with t)
  const ampPx = waveAmp * pxPerM;
  const lambdaPx = 180;
  const surfaceY = x =>
    waterY - ampPx * Math.sin((x / lambdaPx) * 2 * Math.PI - 2 * Math.PI * waveFreq * simT);

  // water fill below the surface
  sctx.fillStyle = "#0a1822";
  sctx.beginPath();
  sctx.moveTo(0, surfaceY(0));
  for (let x = 0; x <= w; x += 4) sctx.lineTo(x, surfaceY(x));
  sctx.lineTo(w, H);
  sctx.lineTo(0, H);
  sctx.closePath();
  sctx.fill();

  // surface line
  sctx.strokeStyle = "#1f3a4d";
  sctx.lineWidth = 1;
  sctx.beginPath();
  for (let x = 0; x <= w; x += 4) {
    const y = surfaceY(x);
    if (x === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
  }
  sctx.stroke();
  const boatCx = w * 0.5;
  const boatBaseY = waterY - h * pxPerM;

  // strut
  const strutLen = 60;
  const strutBot = boatBaseY + strutLen;
  sctx.strokeStyle = "#4a6276";
  sctx.lineWidth = 3;
  sctx.beginPath();
  sctx.moveTo(boatCx, boatBaseY);
  sctx.lineTo(boatCx, strutBot);
  sctx.stroke();

  // foil (tilted by angle; positive angle => leading edge up)
  const foilLen = 70;
  sctx.save();
  sctx.translate(boatCx, strutBot);
  sctx.rotate(-angle);
  sctx.strokeStyle = "#6ad0ff";
  sctx.lineWidth = 4;
  sctx.beginPath();
  sctx.moveTo(-foilLen / 2, 0);
  sctx.lineTo( foilLen / 2, 0);
  sctx.stroke();
  sctx.restore();

  // hull silhouette
  const hullW = 180, hullH = 36;
  sctx.fillStyle = "#cfd8e3";
  sctx.beginPath();
  sctx.moveTo(boatCx - hullW / 2,      boatBaseY);
  sctx.lineTo(boatCx + hullW / 2 - 18, boatBaseY);
  sctx.lineTo(boatCx + hullW / 2,      boatBaseY - hullH * 0.55);
  sctx.lineTo(boatCx + hullW / 2 - 6,  boatBaseY - hullH);
  sctx.lineTo(boatCx - hullW / 2 + 12, boatBaseY - hullH);
  sctx.closePath();
  sctx.fill();

  // target line
  sctx.strokeStyle = "#ffb454";
  sctx.setLineDash([4, 4]);
  sctx.beginPath();
  const tgtY = waterY - H_TGT * pxPerM;
  sctx.moveTo(0, tgtY);
  sctx.lineTo(w, tgtY);
  sctx.stroke();
  sctx.setLineDash([]);
  sctx.fillStyle = "#ffb454";
  sctx.font = "10px ui-monospace, monospace";
  sctx.fillText("TGT 0.5 m", 8, tgtY - 4);
  sctx.fillStyle = "#6b7a8a";
  sctx.fillText("WATER", 8, waterY - 4);
}

// chart: ring buffer of height samples at fixed dt
const CHART_SECONDS = 10;
const CHART_LEN = Math.round(CHART_SECONDS / DT);
const chartBuf = [];
function pushChart(val) {
  chartBuf.push(val);
  if (chartBuf.length > CHART_LEN) chartBuf.shift();
}
function drawChart() {
  const { w, h: H, dpr } = fitCanvas(chart);
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cctx.clearRect(0, 0, w, H);

  const yMin = -0.3, yMax = 1.0;
  const y2px = v => H - ((v - yMin) / (yMax - yMin)) * H;

  cctx.strokeStyle = "#162230";
  cctx.lineWidth = 1;
  cctx.beginPath();
  for (let i = 0; i <= 4; i++) {
    const y = (H / 4) * i;
    cctx.moveTo(0, y); cctx.lineTo(w, y);
  }
  cctx.stroke();

  cctx.strokeStyle = "#1f3a4d";
  cctx.beginPath();
  cctx.moveTo(0, y2px(0)); cctx.lineTo(w, y2px(0));
  cctx.stroke();

  cctx.strokeStyle = "#ffb454";
  cctx.setLineDash([4, 4]);
  cctx.beginPath();
  cctx.moveTo(0, y2px(H_TGT)); cctx.lineTo(w, y2px(H_TGT));
  cctx.stroke();
  cctx.setLineDash([]);

  cctx.strokeStyle = "#6ad0ff";
  cctx.lineWidth = 1.5;
  cctx.beginPath();
  const n = chartBuf.length;
  for (let i = 0; i < n; i++) {
    const x = (i / (CHART_LEN - 1)) * w;
    const y = y2px(chartBuf[i]);
    if (i === 0) cctx.moveTo(x, y); else cctx.lineTo(x, y);
  }
  cctx.stroke();
}

// --- UI bindings ---------------------------------------------------------
const elH = document.getElementById("vH");
const elA = document.getElementById("vA");
const elL = document.getElementById("vL");
const elStatus = document.getElementById("status");

document.getElementById("btnReset").addEventListener("click", reset);
document.getElementById("btnDisturb").addEventListener("click", () => {
  h -= 0.2;
  if (h < 0) h = 0;
});

const sAmp  = document.getElementById("wAmp");
const sFreq = document.getElementById("wFreq");
const lAmp  = document.getElementById("wAmpV");
const lFreq = document.getElementById("wFreqV");
function syncWave() {
  waveAmp  = parseFloat(sAmp.value);
  waveFreq = parseFloat(sFreq.value);
  lAmp.textContent  = waveAmp.toFixed(2) + " m";
  lFreq.textContent = waveFreq.toFixed(2) + " Hz";
}
sAmp.addEventListener("input", syncWave);
sFreq.addEventListener("input", syncWave);
syncWave();

// --- Main loop (fixed-step accumulator) ----------------------------------
reset();
let last = performance.now();
let acc = 0;
const LIFT_AVG_N = 10;
const liftHist = [];
function frame(now) {
  const dt = Math.min(0.1, (now - last) / 1000);
  last = now;
  acc += dt;
  while (acc >= DT) {
    step();
    pushChart(h);
    acc -= DT;
  }
  // display lift from current angle (independent of whether a step ran this frame)
  const liftNow = G_LIFT * Math.sin(angle);
  liftHist.push(liftNow);
  if (liftHist.length > LIFT_AVG_N) liftHist.shift();
  let liftAvg = 0;
  for (let i = 0; i < liftHist.length; i++) liftAvg += liftHist[i];
  liftAvg /= liftHist.length;

  elH.textContent = h.toFixed(2) + " m";
  elA.textContent = (angle * 180 / Math.PI).toFixed(1) + "°";
  elL.textContent = Math.round(liftAvg) + " N";
  const foilborne = h > 0.05;
  elStatus.textContent = foilborne ? "FOILBORNE" : "HULL-BORNE";
  elStatus.className = "badge " + (foilborne ? "foil" : "hull");

  drawScene();
  drawChart();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
